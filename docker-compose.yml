version: "3.9"

services:
  backend:
    build:
      context: ./backend
    environment:
      - LURON_API_KEY=${LURON_API_KEY}
      - LURON_BASE_URL=${LURON_BASE_URL:-https://luron-backend.onrender.com/api/v1}
      - DATABASE_URL=sqlite+aiosqlite:///./data/callbank.db
      - CHROMA_PERSIST_DIR=./data/chroma
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CORS_ORIGINS=["http://localhost:3000","http://frontend:3000"]
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - backend_data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        API_URL: http://backend:8000/api
    environment:
      - API_URL=http://backend:8000/api
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_data:
