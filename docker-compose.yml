version: "3.9"

services:
  # ── Self-hosted LLM (Ollama) ─────────────────────────────────────────────
  # Serves llama3.2:3b for the call conversation engine.
  # On first start it pulls the model (~2 GB) — subsequent starts are instant.
  # GPU acceleration is automatic if NVIDIA drivers + nvidia-container-toolkit are installed.
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    # Pull the default model on startup so the backend can use it immediately
    entrypoint: >
      /bin/sh -c "
        ollama serve &
        OLLAMA_PID=$$!;
        sleep 8;
        ollama pull ${OLLAMA_MODEL:-llama3.2:3b};
        wait $$OLLAMA_PID
      "

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    environment:
      - OLLAMA_API_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
      - PIPER_MODELS_DIR=/app/data/piper_models
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER:-}
      - SERVER_BASE_URL=${SERVER_BASE_URL:-http://localhost:8000}
      - DATABASE_URL=sqlite+aiosqlite:///./data/callbank.db
      - CHROMA_PERSIST_DIR=./data/chroma
      - CORS_ORIGINS=["http://localhost:3000","http://frontend:3000"]
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - backend_data:/app/data
      - piper_models:/app/data/piper_models
    ports:
      - "8000:8000"
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Next.js Frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        API_URL: http://backend:8000/api
    environment:
      - API_URL=http://backend:8000/api
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_data:
  ollama_data:      # Ollama model weights (~2 GB for llama3.2:3b)
  piper_models:     # Piper ONNX models (~50–100 MB each, downloaded on demand)
